# Deploy the frontend to Cloudflare Pages on every push to main.
#
# One-time setup (repo Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   API token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  Dashboard -> Workers & Pages -> account id (right sidebar)
#
# Custom domain: after the first deploy, add whisker.kaimu.app under the
# Pages project's Custom Domains, and create the CNAME it asks for in the
# kaimu.app DNS zone (DigitalOcean).
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_SERVER_URL: https://api.whisker.kaimu.app
      - name: Create Pages project (first run only)
        run: npx wrangler pages project create whisker --production-branch=main 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=whisker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
